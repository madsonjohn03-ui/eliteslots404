<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="background:black; color:white; font-family:sans-serif; text-align:center;">

  <h1>Admin Panel</h1>

  <form id="form">
    <input name="name" placeholder="Casino name"><br><br>
    <input name="bonus" placeholder="Bonus"><br><br>
    <input name="link" placeholder="Link"><br><br>
    <input name="rating" placeholder="Rating"><br><br>
    <button>Add Casino</button>
  </form>

  <p id="status"></p>

  <script>
    const form = document.getElementById("form");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = new FormData(form);

      const res = await fetch("/api/casinos", {
        method: "POST",
        body: new URLSearchParams(data)
      });

      status.innerText = "Added!";
      form.reset();
    });
  </script>

</body>
</html>
