<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 30px 15px;
    }

    h1, h2 {
      color: gold;
    }

    form {
      margin-bottom: 30px;
    }

    input,
    textarea {
      padding: 12px;
      margin: 6px 0;
      width: 420px;
      max-width: 92%;
      border-radius: 8px;
      border: none;
      outline: none;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    label.checkbox {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 14px;
      font-weight: bold;
    }

    label.checkbox input {
      width: auto;
      margin: 0;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    .add-btn { background: gold; color: black; }
    .save-btn { background: #00c853; color: white; }
    .cancel-btn { background: #666; color: white; }
    .delete-btn { background: #ff4d4f; color: white; }
    .edit-btn { background: #2196f3; color: white; }

    .casino-list {
      max-width: 1100px;
      margin: 0 auto;
      text-align: left;
    }

    .casino-item {
      background: #151515;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .casino-info {
      flex: 1;
    }

    .casino-info h3 {
      margin: 0 0 8px;
      color: white;
    }

    .casino-info p {
      margin: 4px 0;
      color: #bdbdbd;
      word-break: break-word;
    }

    .status {
      margin-top: 10px;
      color: #00ff99;
      min-height: 24px;
    }

    .edit-form {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .edit-form input,
    .edit-form textarea {
      display: block;
      width: 100%;
      max-width: 520px;
      margin: 8px 0;
      background: #fff;
      color: #000;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 180px;
      justify-content: flex-end;
    }

    .top-pick-badge {
      display: inline-block;
      background: gold;
      color: black;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <h1>Admin Panel</h1>

  <form id="form">
    <input name="name" placeholder="Casino name" required><br>
    <input name="bonus" placeholder="Bonus" required><br>
    <input name="link" placeholder="Link" required><br>
    <input name="rating" placeholder="Rating" required><br>
    <input name="sort_order" placeholder="Sort Order (1 = first, 2 = second...)"><br>
    <input name="logo" placeholder="Logo URL"><br>
    <input name="badge" placeholder="Badge text (pl. Best for Crypto)"><br>
    <input name="feature_1" placeholder="Feature 1"><br>
    <input name="feature_2" placeholder="Feature 2"><br>
    <input name="feature_3" placeholder="Feature 3"><br>
    <input name="feature_4" placeholder="Feature 4"><br>

    <input name="slug" placeholder="Slug (pl. mbit, onlyspins)"><br>
    <input name="review_title" placeholder="Review title"><br>
    <input name="meta_description" placeholder="Meta description"><br>
    <textarea name="review_text" placeholder="Review text"></textarea><br>
    <textarea name="pros" placeholder="Pros (one per line)"></textarea><br>
    <textarea name="cons" placeholder="Cons (one per line)"></textarea><br>
    <textarea name="faq" placeholder="FAQ (Q: ... / A: ... soronként)"></textarea><br>

    <label class="checkbox">
      <input type="checkbox" name="top_pick">
      Top Pick
    </label><br>

    <button class="add-btn" type="submit">Add Casino</button>
  </form>

  <p id="status" class="status"></p>

  <h2>Casino List</h2>
  <div id="list" class="casino-list"></div>

  <script>
    const form = document.getElementById("form");
    const status = document.getElementById("status");
    const list = document.getElementById("list");

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function loadCasinos() {
      const res = await fetch("/api/casinos");
      const data = await res.json();

      if (!Array.isArray(data)) {
        list.innerHTML = "";
        status.innerText = "Load failed.";
        return;
      }

      list.innerHTML = data.map(c => `
        <div class="casino-item">
          <div class="casino-info">
            <h3>
              ${escapeHtml(c.name)}
              ${c.top_pick ? `<span class="top-pick-badge">TOP PICK</span>` : ""}
            </h3>

            <p><strong>Sort Order:</strong> ${escapeHtml(c.sort_order ?? "-")}</p>
            <p><strong>Bonus:</strong> ${escapeHtml(c.bonus)}</p>
            <p><strong>Rating:</strong> ⭐ ${escapeHtml(c.rating)}</p>
            <p><strong>Link:</strong> ${escapeHtml(c.link)}</p>
            <p><strong>Logo:</strong> ${escapeHtml(c.logo || "-")}</p>
            <p><strong>Badge:</strong> ${escapeHtml(c.badge || "-")}</p>
            <p><strong>Slug:</strong> ${escapeHtml(c.slug || "-")}</p>
            <p><strong>Review Title:</strong> ${escapeHtml(c.review_title || "-")}</p>
            <p><strong>Meta Description:</strong> ${escapeHtml(c.meta_description || "-")}</p>
            <p><strong>Features:</strong>
              ${escapeHtml(c.feature_1 || "-")},
              ${escapeHtml(c.feature_2 || "-")},
              ${escapeHtml(c.feature_3 || "-")},
              ${escapeHtml(c.feature_4 || "-")}
            </p>

            <div class="edit-form" id="edit-form-${c.id}">
              <input id="edit-name-${c.id}" value="${escapeHtml(c.name)}" placeholder="Casino name">
              <input id="edit-bonus-${c.id}" value="${escapeHtml(c.bonus)}" placeholder="Bonus">
              <input id="edit-link-${c.id}" value="${escapeHtml(c.link)}" placeholder="Link">
              <input id="edit-rating-${c.id}" value="${escapeHtml(c.rating)}" placeholder="Rating">
              <input id="edit-sort-order-${c.id}" value="${escapeHtml(c.sort_order ?? "")}" placeholder="Sort Order">
              <input id="edit-logo-${c.id}" value="${escapeHtml(c.logo || "")}" placeholder="Logo URL">
              <input id="edit-badge-${c.id}" value="${escapeHtml(c.badge || "")}" placeholder="Badge text">
              <input id="edit-feature1-${c.id}" value="${escapeHtml(c.feature_1 || "")}" placeholder="Feature 1">
              <input id="edit-feature2-${c.id}" value="${escapeHtml(c.feature_2 || "")}" placeholder="Feature 2">
              <input id="edit-feature3-${c.id}" value="${escapeHtml(c.feature_3 || "")}" placeholder="Feature 3">
              <input id="edit-feature4-${c.id}" value="${escapeHtml(c.feature_4 || "")}" placeholder="Feature 4">

              <input id="edit-slug-${c.id}" value="${escapeHtml(c.slug || "")}" placeholder="Slug">
              <input id="edit-review-title-${c.id}" value="${escapeHtml(c.review_title || "")}" placeholder="Review title">
              <input id="edit-meta-description-${c.id}" value="${escapeHtml(c.meta_description || "")}" placeholder="Meta description">
              <textarea id="edit-review-text-${c.id}" placeholder="Review text">${escapeHtml(c.review_text || "")}</textarea>
              <textarea id="edit-pros-${c.id}" placeholder="Pros">${escapeHtml(c.pros || "")}</textarea>
              <textarea id="edit-cons-${c.id}" placeholder="Cons">${escapeHtml(c.cons || "")}</textarea>
              <textarea id="edit-faq-${c.id}" placeholder="FAQ">${escapeHtml(c.faq || "")}</textarea>

              <label class="checkbox">
                <input type="checkbox" id="edit-top-pick-${c.id}" ${c.top_pick ? "checked" : ""}>
                Top Pick
              </label>
            </div>
          </div>

          <div class="actions">
            <button class="edit-btn" onclick="toggleEdit(${c.id})">Edit</button>
            <button class="save-btn" onclick="saveCasino(${c.id})">Save</button>
            <button class="cancel-btn" onclick="cancelEdit(${c.id})">Cancel</button>
            <button class="delete-btn" onclick="deleteCasino(${c.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = new FormData(form);

      const res = await fetch("/api/casinos", {
        method: "POST",
        body: new URLSearchParams(data)
      });

      if (!res.ok) {
        status.innerText = "Save failed.";
        return;
      }

      status.innerText = "Casino added successfully.";
      form.reset();
      loadCasinos();
    });

    function toggleEdit(id) {
      const editForm = document.getElementById("edit-form-" + id);
      editForm.style.display = editForm.style.display === "block" ? "none" : "block";
    }

    function cancelEdit(id) {
      document.getElementById("edit-form-" + id).style.display = "none";
      status.innerText = "Edit cancelled.";
    }

    async function saveCasino(id) {
      const body = new URLSearchParams({
        name: document.getElementById("edit-name-" + id).value,
        bonus: document.getElementById("edit-bonus-" + id).value,
        link: document.getElementById("edit-link-" + id).value,
        rating: document.getElementById("edit-rating-" + id).value,
        sort_order: document.getElementById("edit-sort-order-" + id).value,
        logo: document.getElementById("edit-logo-" + id).value,
        badge: document.getElementById("edit-badge-" + id).value,
        feature_1: document.getElementById("edit-feature1-" + id).value,
        feature_2: document.getElementById("edit-feature2-" + id).value,
        feature_3: document.getElementById("edit-feature3-" + id).value,
        feature_4: document.getElementById("edit-feature4-" + id).value,
        slug: document.getElementById("edit-slug-" + id).value,
        review_title: document.getElementById("edit-review-title-" + id).value,
        meta_description: document.getElementById("edit-meta-description-" + id).value,
        review_text: document.getElementById("edit-review-text-" + id).value,
        pros: document.getElementById("edit-pros-" + id).value,
        cons: document.getElementById("edit-cons-" + id).value,
        faq: document.getElementById("edit-faq-" + id).value,
        top_pick: document.getElementById("edit-top-pick-" + id).checked ? "on" : ""
      });

      const res = await fetch("/api/casinos/" + id, {
        method: "PUT",
        body
      });

      if (!res.ok) {
        status.innerText = "Update failed.";
        return;
      }

      status.innerText = "Casino updated.";
      loadCasinos();
    }

    async function deleteCasino(id) {
      const ok = confirm("Are you sure you want to delete this casino?");
      if (!ok) return;

      const res = await fetch("/api/casinos/" + id, {
        method: "DELETE"
      });

      if (!res.ok) {
        status.innerText = "Delete failed.";
        return;
      }

      status.innerText = "Casino deleted.";
      loadCasinos();
    }

    loadCasinos();
  </script>
</body>
</html>
