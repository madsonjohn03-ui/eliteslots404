<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 250px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffd700;
    }
  </style>
</head>

<body>

<h1>Admin Panel</h1>

<form id="form">
  <input name="name" placeholder="Casino name"><br>
  <input name="bonus" placeholder="Bonus"><br>
  <input name="link" placeholder="Affiliate link"><br>
  <input name="rating" placeholder="Rating"><br>
  <button>Add Casino</button>
</form>

<p id="status"></p>

<script>
const form = document.getElementById("form");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = new FormData(form);

  await fetch("/api/casinos", {
    method: "POST",
    body: new URLSearchParams(data)
  });

  status.innerText = "✅ Added!";
  form.reset();
});
</script>

</body>
</html>
