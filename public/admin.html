<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    padding: 30px;
}

input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 300px;
}

button {
    padding: 10px 20px;
    background: lime;
    border: none;
    cursor: pointer;
}

.card {
    margin-top: 20px;
    padding: 15px;
    background: #1c1c1c;
    border-radius: 10px;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>Admin Login</h2>
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">
    <h1>Admin Panel</h1>

    <input id="name" placeholder="Casino name">
    <input id="bonus" placeholder="Bonus">
    <input id="link" placeholder="Link">
    <input id="rating" placeholder="Rating (1-5)">
    <input type="file" id="image">

    <button onclick="add()">Add Casino</button>

    <h2>List</h2>
    <div id="list"></div>
</div>

<script>
// LOGIN
function login() {
    const password = document.getElementById("pass").value;

    fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ password })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";
        load();
    })
    .catch(() => {
        alert("Wrong password!");
    });
}

// ADD CASINO
function add() {
    const formData = new FormData();

    formData.append("name", document.getElementById("name").value);
    formData.append("bonus", document.getElementById("bonus").value);
    formData.append("link", document.getElementById("link").value);
    formData.append("rating", document.getElementById("rating").value);

    const file = document.getElementById("image").files[0];
    if (file) {
        formData.append("image", file);
    }

    fetch("/api/casinos", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(() => {
        load();
    });
}

// LOAD LIST
function load() {
    fetch("/api/casinos")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(c => {
            list.innerHTML += `
                <div class="card">
                    <h3>${c.name}</h3>
                    <p>${c.bonus}</p>
                    ${c.image ? `<img src="/uploads/${c.image}" width="100">` : ""}
                </div>
            `;
        });
    });
}
</script>

</body>
</html>
