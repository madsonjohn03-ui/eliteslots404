<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 30px 15px;
    }

    h1, h2 {
      color: gold;
    }

    form {
      margin-bottom: 30px;
    }

    input {
      padding: 12px;
      margin: 6px 0;
      width: 280px;
      max-width: 90%;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    .add-btn {
      background: gold;
      color: black;
    }

    .save-btn {
      background: #00c853;
      color: white;
      margin-left: 8px;
    }

    .cancel-btn {
      background: #555;
      color: white;
      margin-left: 8px;
    }

    .delete-btn {
      background: #ff4d4f;
      color: white;
      margin-left: 8px;
    }

    .edit-btn {
      background: #2196f3;
      color: white;
    }

    .casino-list {
      max-width: 900px;
      margin: 0 auto;
      text-align: left;
    }

    .casino-item {
      background: #151515;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .casino-info h3 {
      margin: 0 0 6px 0;
      color: white;
    }

    .casino-info p {
      margin: 4px 0;
      color: #bdbdbd;
      word-break: break-word;
    }

    .status {
      margin-top: 10px;
      color: #00ff99;
      min-height: 24px;
    }

    .edit-form {
      display: none;
      margin-top: 12px;
    }

    .edit-form input {
      display: block;
      width: 100%;
      max-width: 420px;
      margin: 8px 0;
      background: #fff;
      color: #000;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>

  <h1>Admin Panel</h1>

  <form id="form">
    <input name="name" placeholder="Casino name" required><br>
    <input name="bonus" placeholder="Bonus" required><br>
    <input name="link" placeholder="Link" required><br>
    <input name="rating" placeholder="Rating" required><br>
    <button class="add-btn" type="submit">Add Casino</button>
  </form>

  <p id="status" class="status"></p>

  <h2>Casino List</h2>
  <div id="list" class="casino-list"></div>

  <script>
    const form = document.getElementById("form");
    const status = document.getElementById("status");
    const list = document.getElementById("list");

    async function loadCasinos() {
      const res = await fetch("/api/casinos");
      const data = await res.json();

      list.innerHTML = data.map(c => `
        <div class="casino-item">
          <div class="casino-info" style="flex:1;">
            <h3>${c.name}</h3>
            <p><strong>Bonus:</strong> ${c.bonus}</p>
            <p><strong>Rating:</strong> ⭐ ${c.rating}</p>
            <p><strong>Link:</strong> ${c.link}</p>

            <div class="edit-form" id="edit-form-${c.id}">
              <input id="edit-name-${c.id}" value="${escapeHtml(c.name)}" placeholder="Casino name">
              <input id="edit-bonus-${c.id}" value="${escapeHtml(c.bonus)}" placeholder="Bonus">
              <input id="edit-link-${c.id}" value="${escapeHtml(c.link)}" placeholder="Link">
              <input id="edit-rating-${c.id}" value="${c.rating}" placeholder="Rating">
            </div>
          </div>

          <div class="actions">
            <button class="edit-btn" onclick="toggleEdit(${c.id})">Edit</button>
            <button class="save-btn" onclick="saveCasino(${c.id})">Save</button>
            <button class="cancel-btn" onclick="cancelEdit(${c.id})">Cancel</button>
            <button class="delete-btn" onclick="deleteCasino(${c.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = new FormData(form);

      const res = await fetch("/api/casinos", {
        method: "POST",
        body: new URLSearchParams(data)
      });

      if (!res.ok) {
        status.innerText = "Save failed.";
        return;
      }

      status.innerText = "Casino added successfully.";
      form.reset();
      loadCasinos();
    });

    function toggleEdit(id) {
      const form = document.getElementById("edit-form-" + id);
      form.style.display = form.style.display === "block" ? "none" : "block";
    }

    function cancelEdit(id) {
      document.getElementById("edit-form-" + id).style.display = "none";
      status.innerText = "Edit cancelled.";
    }

    async function saveCasino(id) {
      const name = document.getElementById("edit-name-" + id).value;
      const bonus = document.getElementById("edit-bonus-" + id).value;
      const link = document.getElementById("edit-link-" + id).value;
      const rating = document.getElementById("edit-rating-" + id).value;

      const body = new URLSearchParams({
        name,
        bonus,
        link,
        rating
      });

      const res = await fetch("/api/casinos/" + id, {
        method: "PUT",
        body
      });

      if (!res.ok) {
        status.innerText = "Update failed.";
        return;
      }

      status.innerText = "Casino updated.";
      loadCasinos();
    }

    async function deleteCasino(id) {
      const ok = confirm("Are you sure you want to delete this casino?");
      if (!ok) return;

      const res = await fetch("/api/casinos/" + id, {
        method: "DELETE"
      });

      if (!res.ok) {
        status.innerText = "Delete failed.";
        return;
      }

      status.innerText = "Casino deleted.";
      loadCasinos();
    }

    loadCasinos();
  </script>

</body>
</html>
