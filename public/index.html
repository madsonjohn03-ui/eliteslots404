<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EliteSlots404</title>

  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --line: #2a2a2a;
      --gold: #f2b233;
      --white: #f5f5f5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--white);
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: #070707;
      text-align: center;
      padding: 16px;
      font-size: 24px;
      font-weight: 800;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 60px;
      margin: 0;
    }

    .hero span {
      color: var(--gold);
    }

    .cards {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap: 20px;
    }

    .casino-card {
      background: #080808;
      border: 1px solid #444;
      border-radius: 16px;
      padding: 20px;
    }

    .casino-card.top {
      border-color: var(--gold);
    }

    .rank {
      background: var(--gold);
      color: black;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 900;
    }

    .name {
      text-align: center;
      font-size: 28px;
      margin: 20px 0;
      font-weight: 900;
    }

    .bonus {
      text-align: center;
      font-size: 20px;
      color: var(--gold);
      font-weight: 800;
    }

    .features {
      margin-top: 20px;
    }

    .features div {
      margin: 8px 0;
    }

    .btn {
      margin-top: 20px;
      background: var(--gold);
      color: black;
      padding: 14px;
      text-align: center;
      border-radius: 10px;
      font-weight: 900;
      display: block;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #aaa;
      font-size: 14px;
    }
  </style>

</head>

<body>

<div class="topbar">
  EliteSlots404
</div>

<section class="hero">
  <h1>TOP <span>ONLINE CASINOS</span></h1>
</section>

<div class="cards" id="list"></div>

<footer>
  18+ Gamble responsibly | BeGambleAware.org
</footer>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();

  document.getElementById("list").innerHTML = data.map((c,i)=>`
    <div class="casino-card ${i===0?"top":""}">
      <div class="rank">#${i+1}</div>

      <div class="name">${c.name}</div>

      <div class="bonus">${c.bonus}</div>

      <div class="features">
        <div>✔ Instant Withdraw</div>
        <div>✔ No KYC</div>
        <div>✔ Trusted Casino</div>
        <div>✔ Fast Payments</div>
      </div>

      <a class="btn" href="${c.link}" target="_blank">Claim Bonus</a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
