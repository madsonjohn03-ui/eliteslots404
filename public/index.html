<!DOCTYPE html>
<html>
<head>
  <title>EliteSlots404</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070707;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      color: gold;
      font-size: 28px;
    }

    .hero {
      text-align: center;
      padding: 30px;
    }

    .trust {
      color: #00ffcc;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top {
      border: 2px solid gold;
      box-shadow: 0 0 25px gold;
    }

    .btn {
      background: gold;
      color: black;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
    }

    .popup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #111;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      box-shadow: 0 0 10px black;
    }

    .sticky {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: black;
      text-align: center;
      padding: 15px;
      border-top: 1px solid gold;
    }

    .sticky a {
      background: gold;
      padding: 12px 30px;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }

    .timer {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🔥 EliteSlots404</header>

<div class="hero">
  <h1>Top Casinos 2026</h1>
  <div class="trust">⭐ TrustScore 9.8 | 12,341 Players Today</div>
  <div class="timer">⏳ Offer expires in: <span id="time">05:00</span></div>
</div>

<div class="container" id="list"></div>

<div class="popup" id="popup"></div>

<div class="sticky">
  <a href="#" id="topLink" target="_blank">PLAY TOP CASINO</a>
</div>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = data.map((c, i) => `
    <div class="card ${i===0 ? 'top' : ''}">
      <div>
        <h2>#${i+1} ${c.name}</h2>
        <p>${c.bonus}</p>
        <p>⭐ ${c.rating}</p>
      </div>
      <a class="btn" href="${c.link}" target="_blank">PLAY</a>
    </div>
  `).join("");

  // TOP CASINO BUTTON
  if (data.length > 0) {
    document.getElementById("topLink").href = data[0].link;
  }
}

load();


// 🔥 POPUP FAKE ACTIVITY
const names = ["John", "Mike", "Anna", "Chris", "David"];
function showPopup() {
  const popup = document.getElementById("popup");
  const name = names[Math.floor(Math.random()*names.length)];
  const amount = Math.floor(Math.random()*5000)+500;

  popup.innerText = `${name} just won $${amount}`;
  popup.style.display = "block";

  setTimeout(() => popup.style.display = "none", 3000);
}

setInterval(showPopup, 5000);


// ⏳ COUNTDOWN
let time = 300;
setInterval(() => {
  time--;
  const min = Math.floor(time/60);
  const sec = time%60;
  document.getElementById("time").innerText =
    `${min}:${sec<10?'0':''}${sec}`;
}, 1000);
</script>

</body>
</html>
