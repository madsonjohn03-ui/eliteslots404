<!DOCTYPE html>
<html>
<head>
  <title>EliteSlots404</title>
</head>
<body style="background:black; color:white; font-family:sans-serif; text-align:center;">

  <h1>🔥 Best Online Casinos 2026</h1>

  <div id="list"></div>

  <script>
    async function load() {
      const res = await fetch("/api/casinos");
      const data = await res.json();

      const list = document.getElementById("list");

      list.innerHTML = data.map(c => `
        <div style="border:1px solid gold; margin:20px; padding:20px;">
          <h2>${c.name}</h2>
          <p>${c.bonus}</p>
          <p>⭐ ${c.rating}</p>
          <a href="${c.link}" target="_blank" style="color:yellow;">PLAY NOW</a>
        </div>
      `).join("");
    }

    load();
  </script>

</body>
</html>
