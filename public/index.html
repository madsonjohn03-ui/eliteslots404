<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EliteSlots404</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <style>
    :root {
      --bg: #050505;
      --line: #2a2a2a;
      --gold: #f2b233;
      --white: #f5f5f5;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--white);
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      padding: 20px;
      text-align: center;
    }

    .brand {
      font-size: 28px;
      font-weight: 900;
    }

    .brand span {
      color: var(--gold);
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 60px;
      margin: 0;
    }

    .hero span {
      color: var(--gold);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 30px;
    }

    /* CARD */

    .casino-card {
      background: #080808;
      border: 1px solid #555;
      border-radius: 18px;
      padding: 20px;
      position: relative;
      transition: all .25s;
    }

    .casino-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 30px rgba(242,178,51,0.15);
      border-color: var(--gold);
    }

    .top {
      border: 1px solid var(--gold);
      box-shadow: 0 0 20px rgba(242,178,51,0.2);
    }

    .top-ribbon {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--gold);
      color: black;
      padding: 10px 15px;
      font-weight: 900;
    }

    .claim-btn {
      display: block;
      background: linear-gradient(#f7c14b,#edae2b);
      color: black;
      padding: 14px;
      text-align: center;
      border-radius: 10px;
      font-weight: 900;
      margin-top: 15px;
      transition: .2s;
    }

    .claim-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(242,178,51,0.3);
    }

    .review-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: var(--gold);
      font-weight: 700;
    }

    /* 🔥 ULTRA PAYMENT */

    .payments-strip {
      overflow: hidden;
      padding: 25px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .payments-track {
      display: flex;
      gap: 20px;
      animation: scroll 20s linear infinite;
    }

    .payments-strip:hover .payments-track {
      animation-play-state: paused;
    }

    .payment {
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 900;
      background: #111;
    }

    .visa { background:#1a1f71; }
    .mc { background:#ff5a36; }
    .btc { background:#f7931a; color:black; }
    .eth { background:#627eea; }
    .usdt { background:#26a17b; }
    .ltc { background:#345c9c; }
    .xrp { background:#222; }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
    }

    @keyframes scroll {
      from {transform:translateX(0)}
      to {transform:translateX(-50%)}
    }

    @media(max-width:900px){
      .cards {grid-template-columns:1fr;}
      .hero h1 {font-size:35px;}
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="brand">♛ EliteSlots<span>404</span></div>
</header>

<section class="hero">
  <h1>TOP <span>ONLINE</span> CASINOS</h1>
</section>

<div class="cards" id="list"></div>

<!-- PAYMENT -->
<section class="payments-strip">
  <div class="payments-track">

    <div class="payment visa">VISA</div>
    <div class="dot"></div>

    <div class="payment mc">MC</div>
    <div class="dot"></div>

    <div class="payment btc">BTC</div>
    <div class="dot"></div>

    <div class="payment eth">ETH</div>
    <div class="dot"></div>

    <div class="payment usdt">USDT</div>
    <div class="dot"></div>

    <div class="payment ltc">LTC</div>
    <div class="dot"></div>

    <div class="payment xrp">XRP</div>

    <!-- LOOP -->
    <div class="payment visa">VISA</div>
    <div class="dot"></div>
    <div class="payment mc">MC</div>
    <div class="dot"></div>
    <div class="payment btc">BTC</div>
    <div class="dot"></div>
    <div class="payment eth">ETH</div>

  </div>
</section>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();
  const list = document.getElementById("list");

  list.innerHTML = data.map((c,i)=>`
    <div class="casino-card ${c.top_pick ? 'top':''}">
      ${c.top_pick ? '<div class="top-ribbon">TOP PICK</div>' : ''}

      <h2>${c.name}</h2>
      <p>${c.bonus}</p>

      <a class="claim-btn" href="${c.link}" target="_blank">
        Claim Bonus →
      </a>

      <a class="review-link" href="/casino/${c.slug || c.name.toLowerCase()}">
        Read Review
      </a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
