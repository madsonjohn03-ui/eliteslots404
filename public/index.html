<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EliteSlots404</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070707;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      color: gold;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .hero h1 {
      font-size: 36px;
    }

    .trust {
      color: #00ffcc;
      margin-top: 10px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .top {
      border: 2px solid gold;
      box-shadow: 0 0 20px gold;
    }

    .btn {
      background: gold;
      color: black;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: gray;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    footer a {
      color: gold;
      text-decoration: none;
    }

    footer img {
      margin-top: 10px;
      height: 30px;
    }
  </style>
</head>

<body>

<header>🎰 EliteSlots404</header>

<div class="hero">
  <h1>Top Online Casinos 2026</h1>
  <div class="trust">⭐ TrustScore 9.8 | 12,341 Players Today</div>
</div>

<div class="container" id="list"></div>

<footer>

  <div style="margin-bottom:15px;">
    ⚠️ Gambling can be addictive. Please play responsibly.
  </div>

  <div style="margin-bottom:10px;">
    <strong>18+</strong> |
    <a href="https://www.begambleaware.org" target="_blank">
      BeGambleAware.org
    </a>
  </div>

  <a href="https://www.begambleaware.org" target="_blank">
    <img src="https://www.begambleaware.org/wp-content/themes/begambleaware/assets/img/logo.svg">
  </a>

  <div style="margin-top:15px; font-size:13px;">
    © 2026 EliteSlots404 — All rights reserved.
  </div>

</footer>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = data.map((c, i) => `
    <div class="card ${i===0 ? 'top' : ''}">
      <div>
        <h2>#${i+1} ${c.name}</h2>
        <p>${c.bonus}</p>
        <p>⭐ ${c.rating}</p>
      </div>
      <a class="btn" href="${c.link}" target="_blank">PLAY NOW</a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
