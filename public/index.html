<!DOCTYPE html>
<html>
<head>
  <title>EliteSlots404</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070707;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      color: gold;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .trust {
      font-size: 18px;
      color: #00ffcc;
      margin-top: 10px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .top {
      border: 2px solid gold;
      box-shadow: 0 0 30px gold;
    }

    .left {
      text-align: left;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
    }

    .bonus {
      color: #00ffcc;
    }

    .rating {
      color: gold;
    }

    .review {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }

    .btn {
      background: linear-gradient(45deg, gold, orange);
      padding: 12px 20px;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 0 15px gold;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px gold; }
      50% { box-shadow: 0 0 25px gold; }
      100% { box-shadow: 0 0 10px gold; }
    }

    .live {
      color: #ff4444;
      font-size: 12px;
      margin-top: 5px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: gray;
    }
  </style>
</head>

<body>

<header>🔥 EliteSlots404</header>

<div class="hero">
  <h1>Top Online Casinos 2026</h1>
  <div class="trust">⭐ TrustScore: 9.8/10 • 12,341 Players Today</div>
</div>

<div class="container" id="list"></div>

<footer>© EliteSlots404</footer>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = data.map((c, i) => `
    <div class="card ${i===0 ? 'top' : ''}">
      <div class="left">
        <div class="name">#${i+1} ${c.name}</div>
        <div class="bonus">${c.bonus}</div>
        <div class="rating">⭐ ${c.rating}</div>
        <div class="review">✔ Verified • Fast payouts • Crypto accepted</div>
        <div class="live">🔥 ${Math.floor(Math.random()*50)+10} players playing now</div>
      </div>
      <a class="btn" href="${c.link}" target="_blank">PLAY NOW</a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
