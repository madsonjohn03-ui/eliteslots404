<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EliteSlots404</title>

  <style>
    :root {
      --bg: #070b14;
      --bg-2: #0d1320;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --muted: #a7b0c3;
      --gold: #f6c453;
      --gold-2: #ff9f1a;
      --green: #15d68c;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(246,196,83,0.12), transparent 28%),
        linear-gradient(180deg, #060910, #070b14);
      color: var(--text);
    }

    .shell {
      width: min(1100px, calc(100% - 20px));
      margin: auto;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 26px;
      color: gold;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 36px;
    }

    .trust {
      color: #00ffcc;
      margin-top: 10px;
    }

    .cards {
      padding: 20px;
    }

    .casino-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .featured {
      border: 2px solid gold;
      box-shadow: 0 0 20px gold;
    }

    .btn {
      background: linear-gradient(45deg, var(--gold), var(--gold-2));
      padding: 12px 20px;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      padding: 30px 20px;
      text-align: center;
      color: #7b8599;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<header>🎰 EliteSlots404</header>

<div class="hero">
  <h1>Top Online Casinos 2026</h1>
  <div class="trust">⭐ TrustScore 9.8 | 12,341 Players Today</div>
</div>

<div class="shell cards" id="list"></div>

<div class="footer">

  <div style="margin-bottom:18px; font-size:14px; color:#a7b0c3;">
    ⚠️ Gambling can be addictive. Play responsibly.
  </div>

  <div style="display:flex; justify-content:center; gap:12px; margin-bottom:15px; flex-wrap:wrap;">

    <div style="
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: bold;
      color: white;
    ">
      18+
    </div>

    <a href="https://www.begambleaware.org" target="_blank" style="color: gold;">
      BeGambleAware.org
    </a>

  </div>

  <a href="https://www.begambleaware.org" target="_blank">
    <img src="https://www.begambleaware.org/wp-content/themes/begambleaware/assets/img/logo.svg"
         style="height:32px; opacity:0.8;">
  </a>

  <div style="margin-top:20px; font-size:12px;">
    © 2026 EliteSlots404 — All rights reserved.
  </div>

</div>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = data.map((c, i) => `
    <div class="casino-card ${i===0 ? 'featured' : ''}">
      <div>
        <h2>#${i+1} ${c.name}</h2>
        <p>${c.bonus}</p>
        <p>⭐ ${c.rating}</p>
      </div>
      <a class="btn" href="${c.link}" target="_blank">PLAY NOW</a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
