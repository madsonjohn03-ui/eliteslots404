<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EliteSlots404</title>

<style>
:root {
  --bg: #050505;
  --panel: #0d0d0d;
  --line: #2a2a2a;
  --gold: #f2b233;
  --white: #f5f5f5;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--white);
}

.topbar {
  border-bottom: 1px solid var(--line);
  padding: 20px;
  text-align: center;
}

.brand {
  font-size: 28px;
  font-weight: 900;
}

.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  font-size: 60px;
}

.hero span {
  color: var(--gold);
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 30px;
}

/* ---------------- CARD ---------------- */

.casino-card {
  background: #0b0b0b;
  border: 1px solid #333;
  border-radius: 18px;
  padding: 20px;
}

.claim-btn {
  display: block;
  background: var(--gold);
  color: black;
  padding: 14px;
  text-align: center;
  border-radius: 10px;
  font-weight: 900;
  margin-top: 15px;
}

/* ---------------- PAYMENT STRIP PRO ---------------- */

.payments-strip {
  overflow: hidden;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 25px 0;
}

.payments-track {
  display: flex;
  gap: 28px;
  animation: scroll 20s linear infinite;
  width: max-content;
}

/* BADGE */

.payment {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 52px;
  padding: 0 18px;
  border-radius: 12px;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: .5px;
  color: white;
  background: #111;
  border: 1px solid rgba(255,255,255,0.08);
}

/* INDIVIDUAL COLORS */

.visa { background: #1a1f71; }
.mastercard { background: #eb001b; }
.apple { background: #000; border:1px solid #444; }
.btc { background: #f7931a; color:black; }
.eth { background: #627eea; }
.usdt { background: #26a17b; }
.ltc { background: #345c9c; }
.xrp { background: #0a0a0a; border:1px solid #444; }

/* DOT */

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
}

/* ANIMATION */

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* MOBILE */

@media(max-width:900px){
  .cards {
    grid-template-columns: 1fr;
  }

  .hero h1 {
    font-size: 36px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">♛ EliteSlots<span style="color:#f2b233;">404</span></div>
</header>

<section class="hero">
  <h1>TOP <span>ONLINE</span> CASINOS</h1>
</section>

<main>
  <div class="cards" id="list"></div>
</main>

<!-- 🔥 PRO PAYMENT STRIP -->
<section class="payments-strip">
  <div class="payments-track">

    <div class="payment visa">VISA</div>
    <div class="dot"></div>

    <div class="payment mastercard">Mastercard</div>
    <div class="dot"></div>

    <div class="payment apple">Apple Pay</div>
    <div class="dot"></div>

    <div class="payment btc">Bitcoin</div>
    <div class="dot"></div>

    <div class="payment eth">Ethereum</div>
    <div class="dot"></div>

    <div class="payment usdt">Tether</div>
    <div class="dot"></div>

    <div class="payment ltc">Litecoin</div>
    <div class="dot"></div>

    <div class="payment xrp">Ripple</div>
    <div class="dot"></div>

    <!-- DUPLICATE FOR LOOP -->
    <div class="payment visa">VISA</div>
    <div class="dot"></div>

    <div class="payment mastercard">Mastercard</div>
    <div class="dot"></div>

    <div class="payment apple">Apple Pay</div>
    <div class="dot"></div>

    <div class="payment btc">Bitcoin</div>
    <div class="dot"></div>

    <div class="payment eth">Ethereum</div>
    <div class="dot"></div>

    <div class="payment usdt">Tether</div>
    <div class="dot"></div>

    <div class="payment ltc">Litecoin</div>
    <div class="dot"></div>

    <div class="payment xrp">Ripple</div>

  </div>
</section>

<script>
async function load() {
  const res = await fetch("/api/casinos");
  const data = await res.json();
  const list = document.getElementById("list");

  list.innerHTML = data.map(c => `
    <div class="casino-card">
      <h2>${c.name}</h2>
      <p>${c.bonus}</p>
      <a class="claim-btn" href="${c.link}" target="_blank">Claim Bonus</a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
